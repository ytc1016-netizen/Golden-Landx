<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金土地 Golden Land | 終極 LVA 土地開發反算系統</title>
<style>
:root{--brand-primary:#1A2A3A;--brand-secondary:#2C3E50;--brand-accent:#C5A059;--brand-light:#F4F7F6;--text-dark:#333;--success:#27AE60;--danger:#E74C3C;--card-bg:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--brand-light);color:var(--text-dark);line-height:1.5;font-size:14px;overflow-x:hidden;}

/* 頂部導航 */
.navbar{background:linear-gradient(135deg,var(--brand-primary) 0%,var(--brand-secondary) 100%);padding:12px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.brand{font-size:18px;font-weight:800;color:var(--brand-accent);display:flex;align-items:center;gap:15px;}
.mode-switch{background:rgba(255,255,255,0.1);border-radius:20px;padding:4px;display:flex;gap:5px;border:1px solid rgba(197,160,89,0.5);}
.mode-btn{cursor:pointer;padding:6px 12px;border-radius:16px;font-size:13px;font-weight:bold;color:#ddd;background:transparent;border:none;transition:0.3s;}
.mode-btn.active{background:var(--brand-accent);color:var(--brand-primary);box-shadow:0 2px 5px rgba(0,0,0,0.2);}

/* 版面結構 */
.page-view { display: none; animation: fadeIn 0.3s ease-in-out; }
.page-view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.dashboard-container{display:grid;grid-template-columns:420px 1fr;gap:20px;max-width:1600px;margin:20px auto;padding:0 15px;}
@media (max-width: 900px) {
    .dashboard-container { grid-template-columns: 1fr; margin: 10px auto; }
    .navbar { flex-direction: column; gap: 10px; align-items: flex-start; }
}

/* 側邊表單與區塊 */
.sidebar{background:var(--card-bg);padding:15px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05);border-top:5px solid var(--brand-primary);}
.section-title{font-size:0.85em;color:#fff;background:var(--brand-secondary);padding:6px 10px;border-radius:4px;margin:12px 0 8px 0;font-weight:bold;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.input-group.full{grid-column:span 2;}
.input-group label{display:block;margin-bottom:4px;font-size:0.85em;font-weight:600;}
.input-wrapper{position:relative;display:flex;align-items:center;}
.input-wrapper input,.input-wrapper select{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-weight:bold;font-family:inherit;}
.input-wrapper input:focus{outline:none;border-color:var(--brand-accent);}
.unit{position:absolute;right:10px;color:#888;font-size:0.8em;pointer-events:none;}
.readonly-input{background:#f0f0f0; color:var(--brand-primary); cursor:not-allowed;}

/* 結果呈現區 */
.main-content{display:flex;flex-direction:column;gap:15px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:12px;}
.stat-card{background:var(--card-bg);padding:15px;border-radius:12px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.05);border-bottom:4px solid var(--brand-accent);}
.stat-card h4{color:#666;font-size:0.9em;margin-bottom:5px;}
.stat-card .value{font-size:1.6em;font-weight:800;color:var(--brand-primary);}

.panel{background:var(--card-bg);border-radius:12px;padding:20px;border:1px solid rgba(197,160,89,0.3);box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.panel h3{color:var(--brand-accent);margin-bottom:12px;font-size:1.1em;border-bottom:1px solid #eee;padding-bottom:8px;display:flex;align-items:center;gap:8px;}
.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.data-item{background:var(--brand-light);padding:12px;border-radius:8px;border-left:4px solid var(--brand-secondary);}
.data-item .label{font-size:0.85em;color:#777;margin-bottom:4px;}
.data-item .val{font-size:1.2em;font-weight:700;color:var(--brand-primary);}

.lva-box{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;background:#fdfbf7;padding:20px;border-radius:10px;}
@media (max-width: 768px) { .lva-box { grid-template-columns: 1fr; } }
.rv-result{text-align:center;background:var(--brand-primary);color:#fff;padding:20px;border-radius:10px;display:flex;flex-direction:column;justify-content:center;}
.rv-result .price{font-size:2.4em;font-weight:900;color:var(--brand-accent);margin:10px 0;}
.cost-row{display:flex;justify-content:space-between;font-size:0.95em;padding:6px 0;border-bottom:1px dashed #ddd;}

/* 彈出式授權視窗 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:9999; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal-content { background:#fff; width:90%; max-width:400px; padding:25px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.3); text-align:center; animation: fadeIn 0.3s; }
.modal-content h2 { color:var(--brand-primary); margin-bottom:10px; font-size:1.4em; }
.modal-content p { color:#555; font-size:0.9em; margin-bottom:20px; line-height:1.5; }
.line-info { background:var(--brand-light); padding:10px; border-radius:8px; margin-bottom:20px; font-size:0.85em; font-weight:bold; color:var(--brand-secondary); border:1px solid #ddd; }
.auth-input { width:100%; padding:12px; border:2px solid #ccc; border-radius:8px; font-size:16px; text-align:center; font-weight:bold; margin-bottom:15px; letter-spacing:2px; }
.auth-input:focus { outline:none; border-color:var(--brand-accent); }
.modal-btn { width:100%; padding:12px; background:var(--brand-primary); color:var(--brand-accent); border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px; position: relative; }
.modal-btn.cancel { background:#eee; color:#666; }
.loader { display: none; border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid var(--brand-accent); width: 20px; height: 20px; animation: spin 1s linear infinite; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
.loading .btn-text { visibility: hidden; }
.loading .loader { display: block; }
@keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

.btn-print{background:var(--brand-secondary);color:#fff;border:none;padding:15px;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;margin:20px 0;}
@media print{ .navbar, .sidebar, .btn-print, .mode-switch {display:none!important;} .dashboard-container{display:block;} .panel{page-break-inside:avoid;margin-bottom:20px;} }
</style>
</head>
<body>

<nav class="navbar">
    <div class="brand">
        金土地 Golden Land
        <div class="mode-switch">
            <button id="btn_free" class="mode-btn active" onclick="switchPage('free')">初步免費版</button>
            <button id="btn_pro" class="mode-btn" onclick="switchPage('pro')">進階付費版</button>
        </div>
    </div>
</nav>

<div id="auth_modal" class="modal-overlay">
    <div class="modal-content">
        <h2>🔒 系統權限解鎖</h2>
        <p>進階 LVA 反算引擎需專屬授權碼方可啟用。</p>
        <div class="line-info">
            尚未取得授權？請加入官方 LINE 獲取：<br>
            <span style="color:#00B900; font-size:1.1em;">@258igzxn</span><br>
            (單次試算 88 元 / 月訂閱無限次 468 元)
        </div>
        <input type="password" id="auth_code" class="auth-input" placeholder="請輸入授權碼">
        <button id="btn_verify" class="modal-btn" onclick="verifyAuth()">
            <span class="btn-text">確認解鎖</span>
            <div class="loader"></div>
        </button>
        <button class="modal-btn cancel" onclick="closeModal()">取消返回</button>
    </div>
</div>

<div id="page_free" class="page-view active">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="section-title">一、基地資料與量體法規 (免費版)</div>
            <div class="input-grid">
                <div class="input-group full">
                    <label>土地使用分區</label>
                    <div class="input-wrapper">
                        <select id="f_zoning" onchange="syncZoning('f'); calc();">

                <div class="input-group"><label>法定建蔽率</label><div class="input-wrapper"><input type="number" id="f_cov" value="60" oninput="syncInputs('f'); calc();"><span class="unit">%</span></div></div>
                <div class="input-group"><label>實際設計建蔽率</label><div class="input-wrapper"><input type="number" id="f_dcov" value="40" oninput="syncInputs('f'); calc();"><span class="unit">%</span></div></div>
                <div class="input-group"><label>法定容積率</label><div class="input-wrapper"><input type="number" id="f_far" value="180" oninput="syncInputs('f'); calc();"><span class="unit">%</span></div></div>
                <div class="input-group"><label>基地開挖率</label><div class="input-wrapper"><input type="number" id="f_exc" value="80" oninput="syncInputs('f'); calc();"><span class="unit">%</span></div></div>
            </div>
            
            <div class="section-title">二、產品售價設定 (免費版)</div>
            <div class="input-grid">
                <div class="input-group"><label>住宅售價</label><div class="input-wrapper"><input type="number" id="f_hp" value="35" oninput="syncInputs('f'); calc();"><span class="unit">萬</span></div></div>
                <div class="input-group"><label>營造單價</label><div class="input-wrapper"><input type="number" id="f_cc" value="18" oninput="syncInputs('f'); calc();"><span class="unit">萬</span></div></div>
            </div>
        </aside>

        <main class="main-content">
            <div class="stat-grid">
                <div class="stat-card"><h4>初步總銷概估</h4><div class="value" id="out_f_s">0</div><span style="font-size:10px">萬元</span></div>
                <div class="stat-card" style="border-bottom-color:#ccc;"><h4>初步營造概估</h4><div class="value" id="out_f_c">0</div><span style="font-size:10px">萬元</span></div>
            </div>
            <div class="panel">
                <h3>🏗️ 基礎量體坪效</h3>
                <div class="data-grid">
                    <div class="data-item"><div class="label">可建強度(坪效)</div><div class="val" id="res_f_eff">0 倍</div></div>
                    <div class="data-item"><div class="label">總工程營造建坪</div><div
